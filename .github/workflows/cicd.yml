name: SWR+K8s CI/CD
on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: swr.cn-east-3.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build & Push image to SWR
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: true
          tags: swr.cn-east-3.myhuaweicloud.com/yunjisuan1/yunjisuan-backend:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Configure kubectl access
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Update CCE deployment
        run: |
          kubectl set image deployment/yunjisuan-backend yunjisuan-backend-container=swr.cn-east-3.myhuaweicloud.com/yunjisuan1/yunjisuan-backend:${{ github.sha }} -n default
          kubectl rollout restart deployment/yunjisuan-backend -n default
